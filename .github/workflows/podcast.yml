name: Build Podcast Feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Install XML tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch RSS-Fusion feed (raw XML)
        run: |
          curl -L "https://www.rss-fusion.com/r/1de9b/b80bb77402f85aa2fd9cc18cd06e3ef51755d4e2eb" -o rssfusion.xml

      - name: Extract <item> blocks safely using xmllint
        run: |
          xmllint --xpath "//item" rssfusion.xml > items_raw.xml

      - name: Enhance items (GUID, pubDate, duration, enclosure, episode, summary, keywords)
        run: |
          awk '
            BEGIN { RS="</item>"; ORS="" }
            NR>1 {
              item = $0 "</item>"

              # Extract link
              match(item, /<link>([^<]+)<\/link>/, arr)
              url = arr[1]

              # GUID
              cmd = "printf \"%s\" \"" url "\" | sha1sum"
              cmd | getline hash
              close(cmd)
              sub(/ .*/, "", hash)
              sub(/<item>/, "<item>\n<guid isPermaLink=\"false\">" hash "</guid>", item)

              # pubDate normalization (leave as-is but ensure single spacing)
              if (match(item, /<pubDate>([^<]+)<\/pubDate>/, d)) {
                date = d[1]
                gsub(/  +/, " ", date)
                sub(/<pubDate>[^<]+<\/pubDate>/, "<pubDate>" date "</pubDate>", item)
              }

              # Duration placeholder
              sub(/<\/pubDate>/, "</pubDate>\n<itunes:duration>00:30:00</itunes:duration>", item)

              # Enclosure tag
              sub(/<\/link>/, "</link>\n<enclosure url=\"" url "\" type=\"audio/mpeg\" />", item)

              # Episode numbering
              printf -v ep "%03d", NR-1
              sub(/<\/link>/, "</link>\n<itunes:episode>" ep "</itunes:episode>", item)

              # Summary cleanup
              if (match(item, /<description>([^<]+)<\/description>/, s)) {
                summary = s[1]
                gsub(/<\/?[^>]+>/, "", summary)
                sub(/<description>[^<]+<\/description>/,
                    "<description>" summary "</description>\n<itunes:summary>" summary "</itunes:summary>",
                    item)
              }

              # Keywords from title
              if (match(item, /<title>([^<]+)<\/title>/, t)) {
                title = t[1]
                sub(/<\/description>/,
                    "</description>\n<itunes:keywords>" title ", interviews, journalism</itunes:keywords>",
                    item)
              }

              print item "\n"
            }
          ' items_raw.xml > items_enhanced.xml

      - name: Build final podcast.xml
        run: |
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<rss version="2.0" xmlns:itunes="http://www.itunes.com/dtds/podcast-1.0.dtd" xmlns:atom="http://www.w3.org/2005/Atom">'
            echo '  <channel>'
            echo '    <title>Charlie Meyerson Interviews</title>'
            echo '    <link>https://charlesmeyerson.github.io/podcast.xml</link>'
            echo '    <atom:link href="https://charlesmeyerson.github.io/podcast.xml" rel="self" type="application/rss+xml" />'
            echo '    <link rel="hub" href="https://pubsubhubbub.appspot.com/"/>'
            echo '    <link rel="self" href="https://charlesmeyerson.github.io/podcast.xml"/>'
            echo '    <description>A curated collection of interviews and conversations by journalist Charles Meyerson.</description>'
            echo '    <language>en-us</language>'
            echo '    <copyright>2026 Charles Meyerson</copyright>'
            echo '    <itunes:author>Charles Meyerson</itunes:author>'
            echo '    <itunes:owner>'
            echo '      <itunes:name>Charles Meyerson</itunes:name>'
            echo '      <itunes:email>Meyerson@gmail.com</itunes:email>'
            echo '    </itunes:owner>'
            echo '    <itunes:image href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhViJz7eAAy3Axe4cOf6Wr70aavqYU4dJZjfGg8g20wQHjO4s_AV675bT4Bv2Xlo2aGJ5OHp3DjxRVq9pVR0_QJV_MCElPVWSZ1K8XzsmnxQhshns7PEIbghcvAnYK5Id_OYLP4qwloZ2n3SPw88W_UoP_SROfevVPElIJhLBp2twfR3FEmBOzw/s1600/meyerson-strategy-logo2.png" />'
            echo '    <itunes:category text="News">'
            echo '      <itunes:category text="Interviews"/>'
            echo '    </itunes:category>'
            echo '    <itunes:explicit>false</itunes:explicit>'
            cat items_enhanced.xml
            echo '  </channel>'
            echo '</rss>'
          } > podcast.xml

      - name: Ping WebSub hub
        run: |
          curl -X POST https://pubsubhubbub.appspot.com/publish \
            -d "hub.mode=publish" \
            -d "hub.url=https://charlesmeyerson.github.io/podcast.xml"

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add podcast.xml
          git commit -m "Auto-update podcast feed with enhanced metadata" || true
          git push
