name: Build Podcast Feed

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: |
          npm init -y
          npm install @xmldom/xmldom node-fetch

      - name: Merge feed with Node.js
        run: |
          node scripts/merge-feeds.js

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add podcast.xml
          git commit -m "Update podcast feed" || echo "No changes to commit"
          git push
